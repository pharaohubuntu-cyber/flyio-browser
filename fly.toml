# fly.toml app configuration file generated for firefoxweb on 2026-07-05T02:01:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'firefoxweb'
primary_region = 'ams'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  auto_stop_machines = 'stop'
  auto_start_machines = false
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
